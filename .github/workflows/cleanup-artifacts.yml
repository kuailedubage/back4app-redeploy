name: Cleanup Old Artifacts

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete artifacts older than 10 minutes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching artifacts..."
          CUTOFF=$(date -d '10 minutes ago' -u +%Y-%m-%dT%H:%M:%SZ)
          PAGE=1
          DELETED=0
          while true; do
            RESPONSE=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=50&page=${PAGE}" 2>/dev/null)
            COUNT=$(echo "$RESPONSE" | jq '.artifacts | length')
            if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
              break
            fi
            IDS=$(echo "$RESPONSE" | jq -r \
              --arg cutoff "$CUTOFF" \
              '.artifacts[] | select(.name | startswith("screenshots-")) | select(.created_at < $cutoff) | .id')
            for ID in $IDS; do
              echo "Deleting artifact $ID..."
              gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/$ID" 2>/dev/null \
                && DELETED=$((DELETED + 1)) \
                || echo "  Failed to delete $ID"
            done
            PAGE=$((PAGE + 1))
            if [ "$PAGE" -gt 5 ]; then
              break
            fi
          done
          echo "Deleted $DELETED artifact(s)."
