name: Back4App Auto Redeploy

# Runs every 5 minutes (best-effort) and on manual trigger
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  auto-redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Restore cooldown cache
        id: cooldown-cache
        uses: actions/cache/restore@v4
        with:
          path: .cooldown
          key: cooldown-
          restore-keys: cooldown-

      - name: Check cooldown
        id: cooldown
        run: |
          LAST=0
          if [ -f .cooldown/timestamp ]; then
            LAST=$(cat .cooldown/timestamp)
          fi
          NOW=$(date +%s)
          DIFF=$((NOW - LAST))
          echo "Last redeploy: ${DIFF}s ago"
          if [ "$DIFF" -lt 3600 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Cooldown active (${DIFF}s < 3600s), skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Cooldown expired, proceeding."
          fi

      - name: Checkout repository
        if: steps.cooldown.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.cooldown.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Playwright browsers
        if: steps.cooldown.outputs.skip != 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        if: steps.cooldown.outputs.skip != 'true'
        run: |
          pip install playwright pyotp
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install chromium
          fi
          playwright install-deps chromium

      - name: Run auto redeploy
        id: run
        if: steps.cooldown.outputs.skip != 'true'
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRET }}
          BACK4APP_URL: ${{ secrets.BACK4APP_URL }}
          GITHUB_OUTPUT_FILE: ${{ github.output }}
        run: python scripts/auto_redeploy.py

      - name: Set cooldown on redeploy
        if: steps.cooldown.outputs.skip != 'true' && steps.run.outputs.redeployed == 'true'
        run: |
          mkdir -p .cooldown
          date +%s > .cooldown/timestamp
          echo "Cooldown set for 1 hour."

      - name: Save cooldown cache
        if: steps.cooldown.outputs.skip != 'true' && steps.run.outputs.redeployed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .cooldown
          key: cooldown-${{ github.run_id }}

      - name: Upload screenshots
        if: always() && steps.cooldown.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 3
